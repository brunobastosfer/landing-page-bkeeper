<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#080808"/>
  <!-- Bee body -->
  <ellipse cx="32" cy="36" rx="10" ry="14" fill="#E6BF46"/>
  <!-- Bee stripes -->
  <rect x="22" y="33" width="20" height="4" rx="1" fill="#080808" opacity="0.7"/>
  <rect x="22" y="40" width="20" height="4" rx="1" fill="#080808" opacity="0.7"/>
  <!-- Head -->
  <circle cx="32" cy="21" r="7" fill="#E6BF46"/>
  <!-- Antennae -->
  <line x1="28" y1="15" x2="24" y2="9" stroke="#E6BF46" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="8" r="2" fill="#E6BF46"/>
  <line x1="36" y1="15" x2="40" y2="9" stroke="#E6BF46" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="8" r="2" fill="#E6BF46"/>
  <!-- Wings -->
  <ellipse cx="19" cy="28" rx="8" ry="5" fill="white" opacity="0.25" transform="rotate(-20 19 28)"/>
  <ellipse cx="45" cy="28" rx="8" ry="5" fill="white" opacity="0.25" transform="rotate(20 45 28)"/>
  <!-- Eyes -->
  <circle cx="29" cy="20" r="1.5" fill="#080808"/>
  <circle cx="35" cy="20" r="1.5" fill="#080808"/>
</svg>
